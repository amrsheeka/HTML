<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hangman</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <div class="game-info">
      Game Name: Hangman | Category: <span class="category"></span>
    </div>

    <div class="row">
      <div class="hangman-draw">
        <div class="the-draw">
          <div class="stand"></div>
          <div class="hang"></div>
          <div class="rope"></div>
          <div class="man">
            <div class="head"></div>
            <div class="body"></div>
            <div class="hands">
              <div id="hand-1" class="hand"></div>
              <div id="hand-2" class="hand"></div>
            </div>
            <div class="legs">
              <div id="leg-1" class="leg"></div>
              <div id="leg-2" class="leg"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="letters"></div>
    </div>

    <div class="letters-guess"></div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
