<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Blog</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="./style.css" rel="stylesheet">

    
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
        <a class="navbar-brand fw-bold cursor" onclick="showView('home')">📝 My Blog</a>
        <div class="ms-auto">
            <button class="btn btn-success btn-sm btn-rounded" onclick="showView('create')">+ New Post</button>
        </div>
    </nav>

    <!-- HERO -->
    <div class="hero text-center">
        <h1 class="fw-bold">Welcome to My Blog</h1>
        <p class="mb-0">Write, edit and share your thoughts easily</p>
    </div>

    <!-- HOME -->
    <div id="homeView" class="container">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3 class="fw-bold">Latest Posts</h3>
        </div>
        <div id="postsList" class="row g-4"></div>
    </div>

    <!-- CREATE -->
    <div id="createView" class="container my-4 hidden">
        <div class="card shadow-sm p-4 rounded-4">
            <h3 class="mb-3">Create Post</h3>
            <input id="createTitle" class="form-control form-control-lg mb-3" placeholder="Post title" />
            <textarea id="createContent" class="form-control mb-3" rows="6"
                placeholder="Write your content..."></textarea>
            <button class="btn btn-primary btn-rounded w-100" onclick="addPost()">Publish</button>
        </div>
    </div>

    <!-- EDIT -->
    <div id="editView" class="container my-4 hidden">
        <div class="card shadow-sm p-4 rounded-4">
            <h3 class="mb-3">Edit Post</h3>
            <input id="editTitle" class="form-control form-control-lg mb-3" />
            <textarea id="editContent" class="form-control mb-3" rows="6"></textarea>
            <button class="btn btn-warning btn-rounded w-100" onclick="saveEdit()">Save Changes</button>
        </div>
    </div>

    <!-- READ -->
    <div id="readView" class="container my-4 hidden">
        <div class="card shadow-sm p-4 rounded-4">
            <h2 id="readTitle" class="fw-bold"></h2>
            <hr />
            <p id="readContent" style="white-space: pre-line;"></p>
            <button class="btn btn-secondary btn-rounded mt-3" onclick="showView('home')">← Back</button>
        </div>
    </div>

    <script src="./app.js"></script>

</body>

</html>
